<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deep Work Pomodoro Timer - Sync</title>
  <style>
    :root {
      --text-color: #ffffff;
      --accent-color: #00F0FF;
      --gold-color: #D4AF37;
    }
    
    @media (prefers-color-scheme: light) {
      :root {
        --text-color: #000000;
      }
    }
    
    body {
      background: black;
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      padding: 10px;
    }

    .wrapper {
      background: black;
      border: 2px solid var(--gold-color);
      border-radius: 20px;
      padding: 24px;
      width: 330px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), 0 0 15px rgba(212, 175, 55, 0.1);
      box-sizing: border-box;
    }

    .modes-container {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
      margin-bottom: 20px;
    }

    .mode-btn {
      flex: 1;
      font-size: 0.72rem;
      padding: 8px 4px;
      border: 1px solid var(--gold-color);
      border-radius: 30px;
      background: transparent;
      color: var(--text-color);
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
    }

    .mode-btn:hover {
      background: rgba(212, 175, 55, 0.15);
    }

    .mode-btn.active {
      border-color: var(--accent-color);
      color: var(--accent-color);
      box-shadow: 0 0 12px var(--accent-color);
    }

    .timer-container {
      position: relative;
      width: 180px;
      height: 180px;
      margin-bottom: 20px;
    }

    .progress-ring {
      width: 100%;
      height: 100%;
    }

    .progress-ring__circle-bg {
      fill: transparent;
      stroke: rgba(255, 255, 255, 0.04);
      stroke-width: 2;
    }

    .progress-ring__circle {
      fill: transparent;
      stroke: var(--accent-color);
      stroke-width: 2.5;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
      transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
    }

    .progress-ring__circle.no-transition {
      transition: none !important;
    }

    .timer-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2.4rem;
      font-weight: 200;
      letter-spacing: 1.5px;
      color: var(--text-color);
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .control-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--gold-color);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-color);
      transition: all 0.3s ease;
    }

    .control-btn:hover {
      background: rgba(212, 175, 55, 0.15);
      transform: scale(1.05);
    }

    .control-btn svg {
      fill: currentColor;
      width: 15px;
      height: 15px;
    }

    .stats-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 0.75rem;
      margin-bottom: 15px;
    }

    .stats-title {
      font-size: 0.68rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
      opacity: 0.5;
    }

    .session-indicator {
      display: inline-flex;
      align-items: center;
      font-weight: bold;
      font-size: 1.1rem;
      color: var(--accent-color);
      text-shadow: 0 0 6px var(--accent-color);
    }

    .sync-container {
      margin-top: 10px;
      padding-top: 15px;
      border-top: 1px dashed rgba(212, 175, 55, 0.2);
      width: 100%;
      display: flex;
      gap: 6px;
      align-items: center;
      box-sizing: border-box;
    }

    #sync-input {
      flex: 1;
      background: transparent;
      border: 1px solid var(--gold-color);
      border-radius: 8px;
      color: var(--text-color);
      font-size: 0.68rem;
      padding: 6px 8px;
      outline: none;
      transition: box-shadow 0.3s ease;
      min-width: 0;
    }

    #sync-input:focus {
      box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
    }

    .sync-btn {
      background: transparent;
      border: 1px solid var(--gold-color);
      color: var(--text-color);
      border-radius: 8px;
      font-size: 0.62rem;
      padding: 6px 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .sync-btn:hover {
      background: rgba(212, 175, 55, 0.15);
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="modes-container">
      <button class="mode-btn active" data-mode="studio">Studio</button>
      <button class="mode-btn" data-mode="shortBreak">Pausa B.</button>
      <button class="mode-btn" data-mode="longBreak">Pausa L.</button>
    </div>

    <div class="timer-container">
      <svg class="progress-ring" viewBox="0 0 200 200">
        <circle class="progress-ring__circle-bg" cx="100" cy="100" r="85"></circle>
        <circle class="progress-ring__circle" cx="100" cy="100" r="85"></circle>
      </svg>
      <div class="timer-display" id="timer-display">25:00</div>
    </div>

    <div class="controls">
      <button class="control-btn" id="btn-play" title="Play">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="control-btn" id="btn-pause" title="Pausa">
        <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="control-btn" id="btn-reset" title="Reset">
        <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
      </button>
    </div>

    <div class="stats-container">
      <div class="stats-title">Sessioni Completate Oggi</div>
      <div class="session-indicator" id="indicator-span">
        <span id="session-count">0</span>
      </div>
    </div>

    <div class="sync-container">
      <input type="text" id="sync-input" placeholder="User ID per sincronizzazione" />
      <button class="sync-btn" id="btn-sync-action">Sync</button>
      <button class="sync-btn" id="btn-sync-gen" title="Genera ID">Genera</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-analytics.js";
    import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, query, where, getDocs, Timestamp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBXt2kDZD8ydWPRBSM9v5XK759Et0FjewY",
      authDomain: "media-e-proiezione-laurea.firebaseapp.com",
      databaseURL: "https://media-e-proiezione-laurea-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "media-e-proiezione-laurea",
      storageBucket: "media-e-proiezione-laurea.firebasestorage.app",
      messagingSenderId: "887459538992",
      appId: "1:887459538992:web:0147adda8f0844a90a25f5",
      measurementId: "G-4Q8DD006NR"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);

    let timerInterval = null;
    let isRunning = false;
    let currentMode = 'studio';
    let timeLeft = 25 * 60;
    let totalDuration = 25 * 60;

    let syncId = localStorage.getItem('pomodoro_sync_id') || '';
    let unsubscribeSync = null;

    let syncStartTime = null;
    let syncDurationLeft = null;
    let currentSyncState = 'idle'; 

    const modes = {
      studio: { name: 'Studio', duration: 25 * 60, accent: '#00F0FF' },
      shortBreak: { name: 'Pausa Breve', duration: 5 * 60, accent: '#9D4EDD' },
      longBreak: { name: 'Pausa Lunga', duration: 10 * 60, accent: '#9D4EDD' }
    };

    const timerDisplay = document.getElementById('timer-display');
    const circle = document.querySelector('.progress-ring__circle');
    const playBtn = document.getElementById('btn-play');
    const pauseBtn = document.getElementById('btn-pause');
    const resetBtn = document.getElementById('btn-reset');
    const sessionCountSpan = document.getElementById('session-count');
    const indicatorSpan = document.getElementById('indicator-span');
    const syncInput = document.getElementById('sync-input');
    const syncActionBtn = document.getElementById('btn-sync-action');
    const syncGenBtn = document.getElementById('btn-sync-gen');

    const radius = 85;
    const circumference = 2 * Math.PI * radius;

    circle.style.strokeDasharray = `${circumference} ${circumference}`;
    circle.style.strokeDashoffset = 0;

    function setProgress(percent) {
      const offset = circumference - (percent / 100) * circumference;
      circle.style.strokeDashoffset = offset;
    }

    function updateProgress() {
      const percent = (timeLeft / totalDuration) * 100;
      setProgress(percent);
    }

    function updateDisplay() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      timerDisplay.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    function setMode(modeKey, localTrigger = true) {
      clearInterval(timerInterval);
      timerInterval = null;
      isRunning = false;
      currentMode = modeKey;
      timeLeft = modes[modeKey].duration;
      totalDuration = modes[modeKey].duration;
      
      document.documentElement.style.setProperty('--accent-color', modes[modeKey].accent);
      
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.mode === modeKey) {
          btn.classList.add('active');
        }
      });
      
      circle.classList.add('no-transition');
      updateDisplay();
      setProgress(100);
      
      circle.getBoundingClientRect(); 
      circle.classList.remove('no-transition');
      
      indicatorSpan.style.color = modes[modeKey].accent;
      indicatorSpan.style.textShadow = `0 0 6px ${modes[modeKey].accent}`;

      if (localTrigger && syncId) {
        updateFirestoreSyncState("idle", timeLeft);
      }
    }

    function startLocalInterval() {
      if (timerInterval) clearInterval(timerInterval);
      
      updateDisplay();
      updateProgress();
      
      timerInterval = setInterval(() => {
        if (currentSyncState === 'running' && syncId) {
          const elapsedSec = Math.floor((Date.now() - syncStartTime) / 1000);
          timeLeft = Math.max(0, syncDurationLeft - elapsedSec);
          
          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            timerInterval = null;
            isRunning = false;
            handleTimerComplete();
          }
        } else {
          if (timeLeft > 0) {
            timeLeft--;
          } else {
            clearInterval(timerInterval);
            timerInterval = null;
            isRunning = false;
            handleTimerComplete();
          }
        }
        updateDisplay();
        updateProgress();
      }, 1000);
    }

    function play() {
      if (isRunning) return;
      isRunning = true;
      
      if (syncId) {
        updateFirestoreSyncState("running", timeLeft, Date.now());
      } else {
        startLocalInterval();
      }
    }

    function pause() {
      isRunning = false;
      clearInterval(timerInterval);
      timerInterval = null;
      
      if (syncId) {
        updateFirestoreSyncState("paused", timeLeft);
      } else {
        updateDisplay();
        updateProgress();
      }
    }

    function reset() {
      isRunning = false;
      clearInterval(timerInterval);
      timerInterval = null;
      timeLeft = totalDuration;
      
      if (syncId) {
        updateFirestoreSyncState("idle", timeLeft);
      } else {
        circle.classList.add('no-transition');
        updateDisplay();
        setProgress(100);
        circle.getBoundingClientRect();
        circle.classList.remove('no-transition');
      }
    }

    function playGong() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const now = ctx.currentTime;
        
        const frequencies = [90, 130, 175, 220, 290, 420];
        const masterGain = ctx.createGain();
        
        masterGain.gain.setValueAtTime(0, now);
        masterGain.gain.linearRampToValueAtTime(0.7, now + 0.08);
        masterGain.gain.exponentialRampToValueAtTime(0.0001, now + 6.0);
        
        const filter = ctx.createBiquadFilter();
        filter.type = "lowpass";
        filter.frequency.setValueAtTime(1200, now);
        filter.frequency.exponentialRampToValueAtTime(180, now + 5.0);
        
        frequencies.forEach((freq, idx) => {
          const osc = ctx.createOscillator();
          const oscGain = ctx.createGain();
          
          osc.type = idx % 2 === 0 ? "sine" : "triangle";
          osc.frequency.setValueAtTime(freq, now);
          
          const lfo = ctx.createOscillator();
          const lfoGain = ctx.createGain();
          lfo.frequency.value = 4 + idx;
          lfoGain.gain.value = 2.0;
          
          lfo.connect(lfoGain);
          lfoGain.connect(osc.frequency);
          
          const volume = idx === 0 ? 1.0 : 0.4 / idx;
          oscGain.gain.setValueAtTime(volume, now);
          oscGain.gain.exponentialRampToValueAtTime(0.01, now + (5.5 - idx * 0.5));
          
          osc.connect(oscGain);
          oscGain.connect(masterGain);
          
          lfo.start(now);
          osc.start(now);
          
          lfo.stop(now + 6.0);
          osc.stop(now + 6.0);
        });
        
        masterGain.connect(filter);
        filter.connect(ctx.destination);
      } catch (err) {
        console.error("Web Audio API error: ", err);
      }
    }

    async function fetchCompletedSessions() {
      if (!syncId) {
        sessionCountSpan.textContent = "0";
        return;
      }
      try {
        const startOfToday = new Date();
        startOfToday.setHours(0, 0, 0, 0);
        
        const q = query(
          collection(db, "pomodoro_sessions"),
          where("syncId", "==", syncId),
          where("timestamp", ">=", Timestamp.fromDate(startOfToday))
        );
        
        const querySnapshot = await getDocs(q);
        let count = 0;
        querySnapshot.forEach(() => {
          count++;
        });
        sessionCountSpan.textContent = count;
      } catch (e) {
        console.error("Errore durante il recupero dei dati da Firestore: ", e);
        sessionCountSpan.textContent = "0";
      }
    }

    async function saveSessionToCloud() {
      if (!syncId) return;
      try {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth();
        const date = now.getDate();
        const hour = now.getHours();
        const minute = now.getMinutes();
        const docId = `${syncId}_${year}-${month}-${date}_${hour}-${minute}`;
        
        await setDoc(doc(db, "pomodoro_sessions", docId), {
          type: "Studio",
          duration: 25,
          timestamp: Timestamp.now(),
          syncId: syncId
        });
        fetchCompletedSessions();
      } catch (e) {
        console.error("Errore durante il salvataggio su Firestore: ", e);
      }
    }

    function handleTimerComplete() {
      clearInterval(timerInterval);
      timerInterval = null;
      isRunning = false;
      playGong();
      
      if (currentMode === 'studio') {
        saveSessionToCloud();
        setMode('shortBreak');
      } else {
        setMode('studio');
      }
    }

    async function updateFirestoreSyncState(state, duration, startTime = null) {
      if (!syncId) return;
      try {
        const docRef = doc(db, "timer_syncs", syncId);
        await setDoc(docRef, {
          timerState: state,
          startTime: startTime || Date.now(),
          durationLeft: duration,
          lastUpdated: Date.now(),
          currentMode: currentMode
        });
      } catch (e) {
        console.error("Errore durante l'aggiornamento dello stato Firestore: ", e);
      }
    }

    function applySyncedState(data) {
      if (data.currentMode && data.currentMode !== currentMode) {
        setMode(data.currentMode, false);
      }

      currentSyncState = data.timerState;

      if (data.timerState === "running") {
        syncStartTime = data.startTime;
        syncDurationLeft = data.durationLeft;
        isRunning = true;
        
        const elapsedSec = Math.floor((Date.now() - syncStartTime) / 1000);
        timeLeft = Math.max(0, syncDurationLeft - elapsedSec);
        
        startLocalInterval();
      } else if (data.timerState === "paused") {
        isRunning = false;
        clearInterval(timerInterval);
        timerInterval = null;
        timeLeft = data.durationLeft;
        updateDisplay();
        updateProgress();
      } else if (data.timerState === "idle") {
        isRunning = false;
        clearInterval(timerInterval);
        timerInterval = null;
        timeLeft = data.durationLeft;
        updateDisplay();
        updateProgress();
      }
    }

    function setupSync(id) {
      if (unsubscribeSync) unsubscribeSync();
      if (!id) return;
      
      unsubscribeSync = onSnapshot(doc(db, "timer_syncs", id), (docSnap) => {
        if (docSnap.metadata.hasPendingWrites) return; 
        if (!docSnap.exists()) return;
        
        const data = docSnap.data();
        applySyncedState(data);
      });
    }

    function generateSyncId() {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let result = '';
      for (let i = 0; i < 6; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return result;
    }

    document.addEventListener("DOMContentLoaded", () => {
      setMode('studio', false);
      
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          setMode(e.currentTarget.dataset.mode);
        });
      });
      
      playBtn.addEventListener('click', play);
      pauseBtn.addEventListener('click', pause);
      resetBtn.addEventListener('click', reset);

      if (syncId) {
        syncInput.value = syncId;
        setupSync(syncId);
        fetchCompletedSessions();
      }

      syncActionBtn.addEventListener('click', () => {
        const val = syncInput.value.trim().toUpperCase();
        if (val) {
          syncId = val;
          localStorage.setItem('pomodoro_sync_id', syncId);
          setupSync(syncId);
          fetchCompletedSessions();
        } else {
          syncId = '';
          localStorage.removeItem('pomodoro_sync_id');
          if (unsubscribeSync) unsubscribeSync();
          unsubscribeSync = null;
          sessionCountSpan.textContent = "0";
        }
      });

      syncGenBtn.addEventListener('click', () => {
        const newId = generateSyncId();
        syncInput.value = newId;
        syncActionBtn.click();
      });
    });
  </script>
</body>
</html>
